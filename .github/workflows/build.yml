name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: windows-amd64
          - os: macos-latest
            target: macos-arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Build executable
        run: |
          STRIP_FLAG=""
          if [[ "${{ matrix.target }}" != windows-* ]]; then
            STRIP_FLAG="--strip"
          fi
          uv run pyinstaller \
            --name layer \
            --hidden-import layer \
            --hidden-import main \
            --hidden-import typer \
            --hidden-import shellingham \
            --collect-submodules shellingham \
            --onefile \
            $STRIP_FLAG \
            --noconfirm \
            main.py
        shell: bash

      - name: Rename artifact
        run: |
          if [[ "${{ matrix.target }}" == windows-* ]]; then
            mv dist/layer.exe "dist/layer-${{ matrix.target }}.exe"
          else
            mv dist/layer "dist/layer-${{ matrix.target }}"
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: layer-${{ matrix.target }}
          path: dist/layer-${{ matrix.target }}*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        run: |
          prev_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "$prev_tag" ]]; then
            echo "## Changes since ${prev_tag}" > changelog.md
            echo "" >> changelog.md
            git log --pretty=format:"- %s (%h)" "${prev_tag}..HEAD" >> changelog.md
          else
            echo "## Initial Release" > changelog.md
          fi
        shell: bash

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          generate_release_notes: true
          files: artifacts/*
